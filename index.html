<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kickoff</title>
    <link rel="icon" type="image/png" href="assets/football.png" />
    <style>
      :root {
        color-scheme: light;
        --ink: #17212b;
        --muted: #687586;
        --line: #d7dde5;
        --panel: #f7f9fb;
        --surface: #ffffff;
        --blue: #1f6feb;
        --green: #1f8f5f;
        --red: #c73d4a;
        --amber: #b86b00;
        --shadow: 0 12px 28px rgba(23, 33, 43, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        overflow: hidden;
        background: var(--surface);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      .brand {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 8px;
        min-height: 34px;
        padding-right: 6px;
      }

      .brand-ball {
        position: relative;
        flex: 0 0 auto;
        width: 30px;
        height: 30px;
      }

      .brand-ball canvas {
        display: block;
        width: 30px;
        height: 30px;
      }

      .brand h1 {
        color: #16841d;
        margin: 0;
        font-size: 1.18rem;
        line-height: 1;
        font-weight: 860;
      }

      .status {
        min-width: 210px;
        justify-self: end;
        display: grid;
        grid-template-columns: repeat(3, auto);
        gap: 10px;
        align-items: center;
        color: rgba(255, 255, 255, 0.84);
        font-size: 0.85rem;
      }

      .stat {
        display: grid;
        gap: 2px;
        text-align: right;
      }

      .stat strong {
        color: var(--ink);
        font-size: 1.25rem;
      }

      main {
        padding: 0;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        row-gap: 8px;
        align-items: center;
        justify-content: flex-start;
        margin: 0;
        padding: 8px 10px;
        border-bottom: 1px solid var(--line);
        background: #fbfcfe;
      }

      .toolbar-group {
        flex: 0 0 auto;
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .toolbar-group[hidden] {
        display: none;
      }

      .view-tabs {
        flex: 0 0 auto;
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        border: 1px solid var(--line);
        background: var(--surface);
      }

      .view-tab {
        flex: 0 0 auto;
        border: 0;
        border-right: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        font-size: 0.84rem;
        font-weight: 700;
        min-height: 34px;
        padding: 6px 12px;
        white-space: nowrap;
      }

      .view-tab:last-child {
        border-right: 0;
      }

      .view-tab[aria-pressed="true"] {
        background: var(--ink);
        border-color: var(--ink);
        color: #fff;
      }

      .chips {
        flex: 0 0 auto;
        display: flex;
        flex-wrap: nowrap;
        align-items: center;
        border: 1px solid var(--line);
        background: var(--surface);
      }

      .filter-label {
        flex: 0 0 auto;
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 760;
        text-transform: uppercase;
      }

      .controls {
        flex: 0 0 auto;
        display: flex;
        flex-wrap: nowrap;
        gap: 10px;
        align-items: center;
        justify-content: flex-end;
        margin-left: auto;
      }

      .pill {
        flex: 0 0 auto;
        width: 34px;
        border: 0;
        border-right: 1px solid var(--line);
        background: var(--surface);
        border-radius: 0;
        color: var(--ink);
        cursor: pointer;
        font: inherit;
        font-size: 0.85rem;
        font-weight: 680;
        min-height: 34px;
        padding: 6px 0;
      }

      .pill:first-child {
        width: 44px;
      }

      .pill:last-child {
        border-right: 0;
      }

      .pill[aria-pressed="true"] {
        background: var(--ink);
        border-color: var(--ink);
        color: #fff;
      }

      .pill.all-selected {
        box-shadow: inset 0 -3px 0 #f5c542;
      }

      .table-toggle {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        min-height: 34px;
        padding: 6px 12px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink);
        font-size: 0.85rem;
        font-weight: 620;
        white-space: nowrap;
      }

      .today-jump {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        min-height: 34px;
        padding: 6px 10px;
        border: 1px solid #e0b128;
        background: #fff6c7;
        color: #6e4a00;
        cursor: pointer;
        font: inherit;
        font-size: 0.74rem;
        font-weight: 780;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .today-jump[hidden] {
        display: none;
      }

      .today-jump-arrow {
        min-width: 10px;
        font-size: 0.88rem;
        line-height: 1;
      }

      .table-toggle input {
        width: 16px;
        height: 16px;
        accent-color: var(--ink);
      }

      .table-toggle[hidden] {
        display: none;
      }

      .timezone-control {
        flex: 0 0 auto;
        display: inline-flex;
        gap: 8px;
        align-items: center;
        min-height: 34px;
        padding: 6px 10px;
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--ink);
        font-size: 0.85rem;
        font-weight: 620;
        white-space: nowrap;
      }

      .timezone-control select {
        max-width: 220px;
        border: 0;
        background: transparent;
        color: var(--ink);
        font: inherit;
        outline: 0;
      }

      .timeline-shell {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        width: 100vw;
        height: 100dvh;
        overflow: hidden;
        background: var(--surface);
      }

      .timeline-viewport {
        min-height: 0;
        overflow: auto;
        background: var(--surface);
      }

      .timeline {
        min-width: 760px;
        position: relative;
      }

      .axis {
        position: sticky;
        top: 0;
        z-index: 4;
        height: 54px;
        background: rgba(255, 255, 255, 0.96);
        border-bottom: 1px solid var(--line);
      }

      .tick {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 1px;
        background: var(--line);
      }

      .tick.today {
        width: 3px;
        background: #f5c542;
        box-shadow: 0 0 0 1px rgba(184, 107, 0, 0.28);
      }

      .tick span {
        position: absolute;
        top: 10px;
        left: 8px;
        width: 104px;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 650;
        white-space: nowrap;
      }

      .today-badge {
        display: inline-block;
        margin-left: 8px;
        padding: 2px 6px;
        border: 1px solid #e0b128;
        background: #fff6c7;
        color: #6e4a00;
        font-size: 0.65rem;
        font-style: normal;
        font-weight: 780;
        text-transform: uppercase;
      }

      .today-line {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 3px;
        background: #f5c542;
        box-shadow: 0 0 0 1px rgba(184, 107, 0, 0.28);
        z-index: 1;
        pointer-events: none;
      }

      .group-row {
        position: relative;
        display: grid;
        grid-template-columns: 92px 1fr;
        min-height: 126px;
        border-bottom: 1px solid #e5e9ef;
      }

      .group-row:last-child {
        border-bottom: 0;
      }

      .group-label {
        position: sticky;
        left: 0;
        z-index: 3;
        display: grid;
        place-items: center;
        background: #f5f7fa;
        border-right: 1px solid var(--line);
        font-weight: 760;
        color: #2d3745;
      }

      .lane {
        position: relative;
        isolation: isolate;
        min-height: 126px;
        background:
          linear-gradient(rgba(245, 252, 242, 0.66), rgba(245, 252, 242, 0.66)),
          url("assets/grass2.jpg");
        background-size:
          100% 100%,
          var(--date-column-width, 292px) auto;
        background-repeat: repeat;
      }

      .lane::before,
      .lane::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .lane::before {
        z-index: 0;
        background: rgba(31, 92, 42, 0.14);
        mask-image: linear-gradient(90deg, transparent 0 50%, #000 50% 100%);
        mask-size: calc(var(--date-column-width, 292px) * 2) 100%;
        mask-repeat: repeat;
        -webkit-mask-image: linear-gradient(90deg, transparent 0 50%, #000 50% 100%);
        -webkit-mask-size: calc(var(--date-column-width, 292px) * 2) 100%;
        -webkit-mask-repeat: repeat;
      }

      .lane::after {
        z-index: 1;
        background: linear-gradient(
          90deg,
          rgba(215, 221, 229, 0.68) 0,
          rgba(215, 221, 229, 0.68) 1px,
          transparent 1px
        );
        background-size: var(--date-column-width, 292px) 100%;
        background-repeat: repeat;
      }

      .lane.with-tables::after {
        background-image: linear-gradient(
          90deg,
          rgba(215, 221, 229, 0.74) 0,
          rgba(215, 221, 229, 0.74) 1px,
          transparent 1px
        );
      }

      .match-card {
        position: absolute;
        z-index: 2;
        top: 15px;
        width: 214px;
        min-height: 92px;
        transform: translateX(-50%);
        border: 1px solid #cfd7e2;
        background: var(--surface);
        box-shadow: 0 8px 20px rgba(23, 33, 43, 0.08);
        padding: 10px 10px 9px;
      }

      .match-card.fixture {
        background: #fbfcfe;
        border-style: dashed;
      }

      .match-card.live {
        border-color: var(--red);
        box-shadow: 0 8px 20px rgba(199, 61, 74, 0.13);
      }

      .match-card::before {
        content: "";
        position: absolute;
        top: -1px;
        left: -1px;
        bottom: -1px;
        width: 5px;
        background: var(--accent, var(--blue));
      }

      .match-head {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 0.73rem;
        font-weight: 670;
        text-transform: uppercase;
      }

      .match-title {
        display: inline-flex;
        gap: 6px;
        align-items: center;
        min-width: 0;
        white-space: nowrap;
      }

      .match-time {
        white-space: nowrap;
      }

      .badge {
        border-radius: 999px;
        background: #ecf2f9;
        color: #526276;
        font-size: 0.63rem;
        line-height: 1;
        padding: 4px 6px;
      }

      .badge.live {
        background: #fde8eb;
        color: var(--red);
      }

      .team {
        display: grid;
        grid-template-columns: 22px minmax(0, 1fr) auto;
        gap: 7px;
        align-items: center;
        min-height: 27px;
      }

      .team-crest {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 1px solid #d9dfe8;
        object-fit: cover;
        background: #fff;
        overflow: hidden;
      }

      .team-crest.placeholder {
        display: grid;
        place-items: center;
        padding: 2px;
        background: #edf2f7;
        color: #536273;
        font-size: 0.47rem;
        font-weight: 820;
        letter-spacing: 0.01em;
        line-height: 1.05;
        text-align: center;
      }

      .team-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 0.86rem;
        font-weight: 650;
      }

      .score {
        min-width: 20px;
        text-align: right;
        font-size: 1.05rem;
        font-weight: 780;
      }

      .score.pending {
        color: #9aa5b3;
        font-size: 0.82rem;
      }

      .winner .team-name,
      .winner .score {
        color: var(--green);
      }

      .standings-card {
        position: absolute;
        z-index: 2;
        width: 268px;
        transform: translateX(-50%);
        border: 1px solid #cfd7e2;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 8px 18px rgba(23, 33, 43, 0.07);
        padding: 9px 10px 10px;
      }

      .standings-title {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 7px;
        color: var(--muted);
        font-size: 0.68rem;
        font-weight: 750;
        text-transform: uppercase;
      }

      .standings-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.67rem;
        line-height: 1.15;
        table-layout: fixed;
      }

      .standings-table th,
      .standings-table td {
        padding: 3px 2px;
        text-align: right;
        border-bottom: 1px solid #edf1f5;
      }

      .standings-table th:first-child,
      .standings-table td:first-child {
        width: 76px;
        text-align: left;
      }

      .standings-table th {
        color: var(--muted);
        font-weight: 720;
      }

      .standings-table tbody tr:first-child td {
        color: var(--green);
        font-weight: 760;
      }

      .standings-table tbody tr:last-child td {
        border-bottom: 0;
      }

      .standings-team {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .empty {
        min-height: 360px;
        display: grid;
        place-items: center;
        color: var(--muted);
        padding: 40px;
        text-align: center;
      }

      .knockout-shell {
        display: grid;
        grid-template-columns: 248px minmax(0, 1fr);
        align-items: start;
        min-height: 100%;
      }

      .knockout-standings {
        position: sticky;
        top: 0;
        left: 0;
        z-index: 3;
        align-self: start;
        padding: 14px 12px 18px;
        background: #f6f8fb;
        border-right: 1px solid var(--line);
      }

      .knockout-kicker {
        display: inline-block;
        margin-bottom: 5px;
        color: var(--muted);
        font-size: 0.67rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .knockout-standings h2 {
        margin: 0 0 4px;
        font-size: 1rem;
        line-height: 1.1;
      }

      .knockout-standings p {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 0.74rem;
        line-height: 1.35;
      }

      .knockout-standings-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .knockout-group-card {
        border: 1px solid #d7dde5;
        background: rgba(255, 255, 255, 0.98);
        box-shadow: 0 8px 18px rgba(23, 33, 43, 0.05);
        padding: 8px 9px 9px;
      }

      .knockout-group-title {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 7px;
        color: var(--muted);
        font-size: 0.66rem;
        font-weight: 790;
        text-transform: uppercase;
      }

      .knockout-group-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.66rem;
        line-height: 1.1;
      }

      .knockout-group-table th,
      .knockout-group-table td {
        padding: 3px 0;
        border-bottom: 1px solid #edf1f5;
        text-align: right;
      }

      .knockout-group-table th:first-child,
      .knockout-group-table td:first-child {
        text-align: left;
      }

      .knockout-group-table th {
        color: var(--muted);
        font-weight: 740;
      }

      .knockout-group-table tbody tr:nth-child(-n + 2) td {
        color: var(--green);
        font-weight: 760;
      }

      .knockout-group-table tbody tr:last-child td {
        border-bottom: 0;
      }

      .knockout-board {
        position: relative;
        isolation: isolate;
        min-height: 100%;
        background:
          linear-gradient(rgba(245, 252, 242, 0.66), rgba(245, 252, 242, 0.66)),
          url("assets/grass2.jpg");
        background-size:
          100% 100%,
          var(--knockout-column-width, 292px) auto;
        background-repeat: repeat;
      }

      .knockout-board::before,
      .knockout-board::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .knockout-board::before {
        z-index: 0;
        background: rgba(31, 92, 42, 0.14);
        mask-image: linear-gradient(90deg, transparent 0 50%, #000 50% 100%);
        mask-size: calc(var(--knockout-column-width, 292px) * 2) 100%;
        mask-repeat: repeat;
        -webkit-mask-image: linear-gradient(90deg, transparent 0 50%, #000 50% 100%);
        -webkit-mask-size: calc(var(--knockout-column-width, 292px) * 2) 100%;
        -webkit-mask-repeat: repeat;
      }

      .knockout-board::after {
        z-index: 1;
        background: linear-gradient(
          90deg,
          rgba(215, 221, 229, 0.68) 0,
          rgba(215, 221, 229, 0.68) 1px,
          transparent 1px
        );
        background-size: var(--knockout-column-width, 292px) 100%;
        background-repeat: repeat;
      }

      .knockout-axis {
        position: sticky;
        top: 0;
        z-index: 4;
        height: 54px;
        background: rgba(255, 255, 255, 0.96);
        border-bottom: 1px solid var(--line);
      }

      .knockout-axis-inner {
        position: relative;
        height: 100%;
      }

      .knockout-bracket {
        position: relative;
        z-index: 2;
      }

      .bracket-stage {
        position: absolute;
        top: 0;
        bottom: 0;
        width: var(--knockout-column-width, 292px);
      }

      .bracket-stage span {
        position: absolute;
        top: 10px;
        left: 8px;
        width: 124px;
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 650;
        white-space: nowrap;
        text-transform: uppercase;
      }

      .bracket-lines {
        position: absolute;
        inset: 0;
        overflow: visible;
        pointer-events: none;
      }

      .bracket-line {
        fill: none;
        stroke: rgba(46, 62, 79, 0.72);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .bracket-node {
        fill: #2e3e4f;
      }

      .match-card.bracket-card {
        width: 214px;
        min-height: 128px;
      }

      .bracket-card .match-head {
        margin-bottom: 7px;
      }

      .team-stack {
        display: grid;
        min-width: 0;
      }

      .team-detail {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--muted);
        font-size: 0.62rem;
        font-weight: 680;
      }

      .bracket-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 8px;
        color: var(--muted);
        font-size: 0.63rem;
        font-weight: 760;
        line-height: 1.2;
      }

      .flow-pill {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        padding: 3px 7px;
        border: 1px solid #d5dde7;
        background: #f4f7fb;
        color: #425266;
        font-size: 0.62rem;
        font-weight: 760;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .bracket-route {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: normal;
        text-transform: none;
      }

      .bracket-note {
        color: #8a5300;
      }

      .app-footer {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 16px;
        align-items: center;
        margin: 0;
        min-height: 30px;
        padding: 5px 10px;
        border-top: 1px solid var(--line);
        background: #fbfcfe;
        color: var(--muted);
        font-size: 0.76rem;
      }

      .summary {
        display: flex;
        flex: 0 0 auto;
        flex-wrap: wrap;
        gap: 6px 12px;
        align-items: center;
        margin: 0;
        background: transparent;
      }

      .summary-item {
        display: inline-flex;
        gap: 4px;
        align-items: baseline;
        min-height: 0;
        padding: 0;
        background: transparent;
      }

      .summary-item strong {
        color: var(--ink);
        font-size: 0.8rem;
        line-height: 1.1;
      }

      .summary-item span {
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 650;
        text-transform: uppercase;
      }

      .source {
        flex: 1 1 auto;
        min-width: 260px;
      }

      .source a {
        color: var(--blue);
      }

      @media (max-width: 760px) {
        .toolbar {
          align-items: flex-start;
        }

        .controls {
          width: 100%;
          margin-left: 0;
          justify-content: space-between;
        }

        .table-toggle {
          flex: 0 0 auto;
        }

        .timeline {
          min-width: 760px;
        }

        .group-row {
          grid-template-columns: 92px 1fr;
        }

        .match-card {
          width: 196px;
        }

        .match-card.bracket-card {
          width: 214px;
        }

        .knockout-shell {
          grid-template-columns: 220px minmax(0, 1fr);
        }

        .summary {
          overflow-x: auto;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .brand-ball canvas {
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="timeline-shell">
      <div class="toolbar">
        <div class="brand">
          <span class="brand-ball" aria-hidden="true">
            <canvas id="brandBall3d" width="96" height="96"></canvas>
          </span>
          <h1>Kickoff</h1>
        </div>
        <span class="filter-label" id="viewTabLabel">View</span>
        <nav class="view-tabs" id="viewTabs" aria-labelledby="viewTabLabel"></nav>
        <div class="toolbar-group" id="groupControls">
          <span class="filter-label" id="groupFilterLabel">Group</span>
          <nav class="chips" id="groupFilters" aria-labelledby="groupFilterLabel"></nav>
        </div>
        <div class="controls">
          <button class="today-jump" id="todayJump" type="button" hidden>
            <span class="today-jump-arrow" aria-hidden="true">→</span>
            <span>TODAY</span>
          </button>
          <label class="timezone-control">
            Timezone
            <select id="timezoneSelect" aria-label="Timezone"></select>
          </label>
          <label class="table-toggle" id="standingsToggle">
            <input id="showTables" type="checkbox" />
            Standings
          </label>
        </div>
      </div>
      <section class="timeline-viewport" aria-label="Group-stage match timeline">
        <div class="timeline" id="timeline">
          <div class="empty">Loading FIFA group matches</div>
        </div>
      </section>
      <footer class="app-footer">
        <section class="summary" aria-live="polite" aria-label="Timeline summary">
          <span class="summary-item"><strong id="resultCount">0</strong><span>results</span></span>
          <span class="summary-item"><strong id="fixtureCount">0</strong><span>fixtures</span></span>
          <span class="summary-item"><strong id="goalCount">0</strong><span>goals</span></span>
          <span class="summary-item"><strong id="liveCount">0</strong><span>live</span></span>
          <span class="summary-item"><strong id="dateRange">-</strong><span>date range</span></span>
        </section>
        <div class="source">
          Source:
          <a href="https://api.fifa.com/api/v3/calendar/matches?language=en&amp;count=104&amp;idCompetition=17&amp;idSeason=285023">FIFA calendar API</a>
          · Icon:
          <a href="https://www.flaticon.com/free-icon/soccer-ball-variant_33736?term=football&amp;page=1&amp;position=4&amp;origin=tag&amp;related_id=33736">Freepik / Flaticon</a>
          · Ball texture:
          <a href="https://github.com/jeromeetienne/threex.sportballs/tree/master/images">THREEx SportBalls</a>
        </div>
      </footer>
    </main>

    <script>
      const API_URL =
        "https://api.fifa.com/api/v3/calendar/matches?language=en&count=104&idCompetition=17&idSeason=285023";
      const STORAGE_KEY = "kickoff-view-state-v2";
      const GROUPS = "ABCDEFGHIJKL".split("");
      const VIEW_TABS = [
        { id: "groups", label: "Group Stage" },
        { id: "knockout", label: "Knockout" },
      ];
      const LABEL_WIDTH = 92;
      const DATE_COLUMN_WIDTH = 292;
      const TABLE_DATE_COLUMN_WIDTH = DATE_COLUMN_WIDTH;
      const GROUP_COLORS = [
        "#1f6feb",
        "#1f8f5f",
        "#c73d4a",
        "#b86b00",
        "#6f42c1",
        "#0f766e",
        "#9a3412",
        "#2563eb",
        "#be123c",
        "#4d7c0f",
        "#7c3aed",
        "#047857",
      ];
      const KNOCKOUT_MAIN_STAGE_ORDER = [
        "Round of 32",
        "Round of 16",
        "Quarter-final",
        "Semi-final",
      ];
      const KNOCKOUT_STAGE_LABELS = {
        "Round of 32": "Round of 32",
        "Round of 16": "Round of 16",
        "Quarter-final": "Quarter-finals",
        "Semi-final": "Semi-finals",
        Final: "Final",
        "Play-off for third place": "Third place",
      };
      const KNOCKOUT_STAGE_COLORS = {
        "Round of 32": "#2563eb",
        "Round of 16": "#0f766e",
        "Quarter-final": "#b86b00",
        "Semi-final": "#c73d4a",
        Final: "#16841d",
        "Play-off for third place": "#7a5c00",
      };
      const KNOCKOUT_COLUMN_WIDTH = DATE_COLUMN_WIDTH;
      const KNOCKOUT_CARD_WIDTH = 214;
      const KNOCKOUT_CARD_HEIGHT = 128;
      const KNOCKOUT_COLUMN_GAP = KNOCKOUT_COLUMN_WIDTH - KNOCKOUT_CARD_WIDTH;
      const KNOCKOUT_LEFT_PADDING = 0;
      const KNOCKOUT_TOP_PADDING = 15;
      const KNOCKOUT_BASE_GAP = 28;
      const KNOCKOUT_THIRD_PLACE_COLUMN_INDEX = 4;
      const KNOCKOUT_FINAL_COLUMN_INDEX = 5;
      const KNOCKOUT_THIRD_PLACE_LEFT =
        KNOCKOUT_LEFT_PADDING +
        KNOCKOUT_THIRD_PLACE_COLUMN_INDEX * KNOCKOUT_COLUMN_WIDTH +
        (KNOCKOUT_COLUMN_WIDTH - KNOCKOUT_CARD_WIDTH) / 2;
      const KNOCKOUT_FINAL_LEFT =
        KNOCKOUT_LEFT_PADDING +
        KNOCKOUT_FINAL_COLUMN_INDEX * KNOCKOUT_COLUMN_WIDTH +
        (KNOCKOUT_COLUMN_WIDTH - KNOCKOUT_CARD_WIDTH) / 2;
      const KNOCKOUT_THIRD_PLACE_OFFSET = 228;
      const KNOCKOUT_RAIL_WIDTH = 248;
      const OFFSET_TIMEZONES = [
        { offset: -720, city: "Baker Island", country: "USA" },
        { offset: -660, city: "Pago Pago", country: "American Samoa" },
        { offset: -600, city: "Honolulu", country: "USA" },
        { offset: -540, city: "Gambier Islands", country: "French Polynesia" },
        { offset: -480, city: "Anchorage", country: "USA" },
        { offset: -420, city: "Vancouver", country: "Canada" },
        { offset: -360, city: "Mexico City", country: "Mexico" },
        { offset: -300, city: "Chicago", country: "USA" },
        { offset: -240, city: "New York", country: "USA" },
        { offset: -210, city: "St. John's", country: "Canada" },
        { offset: -180, city: "Buenos Aires", country: "Argentina" },
        { offset: -120, city: "South Georgia", country: "UK" },
        { offset: -60, city: "Azores", country: "Portugal" },
        { offset: 0, city: "Reykjavik", country: "Iceland" },
        { offset: 60, city: "London", country: "UK" },
        { offset: 120, city: "Paris", country: "France" },
        { offset: 180, city: "Doha", country: "Qatar" },
        { offset: 210, city: "Tehran", country: "Iran" },
        { offset: 240, city: "Dubai", country: "UAE" },
        { offset: 270, city: "Kabul", country: "Afghanistan" },
        { offset: 300, city: "Karachi", country: "Pakistan" },
        { offset: 330, city: "New Delhi", country: "India" },
        { offset: 345, city: "Kathmandu", country: "Nepal" },
        { offset: 360, city: "Dhaka", country: "Bangladesh" },
        { offset: 390, city: "Yangon", country: "Myanmar" },
        { offset: 420, city: "Bangkok", country: "Thailand" },
        { offset: 480, city: "Beijing", country: "China" },
        { offset: 525, city: "Eucla", country: "Australia" },
        { offset: 540, city: "Tokyo", country: "Japan" },
        { offset: 570, city: "Adelaide", country: "Australia" },
        { offset: 600, city: "Sydney", country: "Australia" },
        { offset: 630, city: "Lord Howe Island", country: "Australia" },
        { offset: 660, city: "Noumea", country: "New Caledonia" },
        { offset: 720, city: "Auckland", country: "New Zealand" },
      ];

      const state = {
        matches: [],
        activeTab: "groups",
        selectedGroups: new Set(),
        showTables: true,
        timeZoneOffset: getBrowserOffsetMinutes(),
        scrollByTab: {
          groups: null,
          knockout: null,
        },
        renderedDateKeys: [],
        renderedColumnWidth: DATE_COLUMN_WIDTH,
      };

      const els = {
        viewTabs: document.querySelector("#viewTabs"),
        groupControls: document.querySelector("#groupControls"),
        filters: document.querySelector("#groupFilters"),
        viewport: document.querySelector(".timeline-viewport"),
        timeline: document.querySelector("#timeline"),
        timezoneSelect: document.querySelector("#timezoneSelect"),
        standingsToggle: document.querySelector("#standingsToggle"),
        showTables: document.querySelector("#showTables"),
        todayJump: document.querySelector("#todayJump"),
        resultCount: document.querySelector("#resultCount"),
        fixtureCount: document.querySelector("#fixtureCount"),
        liveCount: document.querySelector("#liveCount"),
        goalCount: document.querySelector("#goalCount"),
        dateRange: document.querySelector("#dateRange"),
      };
      let scrollSaveFrame = 0;
      let scrollSaveTimeout = 0;

      function getBrowserOffsetMinutes() {
        return -new Date().getTimezoneOffset();
      }

      function captureScroll() {
        return {
          left: els.viewport?.scrollLeft || 0,
          top: els.viewport?.scrollTop || 0,
        };
      }

      function validOffset(offset) {
        return OFFSET_TIMEZONES.some((zone) => zone.offset === offset);
      }

      function validTab(tab) {
        return VIEW_TABS.some((item) => item.id === tab);
      }

      function loadViewState() {
        try {
          const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
          if (!saved || typeof saved !== "object") return;
          if (validTab(saved.activeTab)) {
            state.activeTab = saved.activeTab;
          }
          if (Array.isArray(saved.selectedGroups)) {
            state.selectedGroups = new Set(
              saved.selectedGroups.filter((group) => GROUPS.includes(group)),
            );
          }
          if (typeof saved.showTables === "boolean") {
            state.showTables = saved.showTables;
          }
          if (Number.isFinite(saved.timeZoneOffset) && validOffset(saved.timeZoneOffset)) {
            state.timeZoneOffset = saved.timeZoneOffset;
          }
          if (saved.scrollByTab && typeof saved.scrollByTab === "object") {
            for (const tab of VIEW_TABS.map((item) => item.id)) {
              const scroll = saved.scrollByTab[tab];
              if (
                scroll &&
                Number.isFinite(scroll.left) &&
                Number.isFinite(scroll.top)
              ) {
                state.scrollByTab[tab] = {
                  left: Math.max(0, scroll.left),
                  top: Math.max(0, scroll.top),
                };
              }
            }
          } else if (
            saved.scroll &&
            Number.isFinite(saved.scroll.left) &&
            Number.isFinite(saved.scroll.top)
          ) {
            state.scrollByTab.groups = {
              left: Math.max(0, saved.scroll.left),
              top: Math.max(0, saved.scroll.top),
            };
          }
        } catch {
          state.scrollByTab.groups = null;
          state.scrollByTab.knockout = null;
        }
      }

      function saveViewState(scrollOverride) {
        state.scrollByTab[state.activeTab] = scrollOverride || captureScroll();
        try {
          localStorage.setItem(
            STORAGE_KEY,
            JSON.stringify({
              activeTab: state.activeTab,
              selectedGroups: [...state.selectedGroups],
              showTables: state.showTables,
              timeZoneOffset: state.timeZoneOffset,
              scrollByTab: state.scrollByTab,
            }),
          );
        } catch {
          // Ignore storage failures; the app should remain fully usable.
        }
      }

      function scheduleScrollSave() {
        if (scrollSaveFrame) return;
        scrollSaveFrame = requestAnimationFrame(() => {
          scrollSaveFrame = 0;
          updateTodayJump();
        });
        clearTimeout(scrollSaveTimeout);
        scrollSaveTimeout = setTimeout(() => {
          scrollSaveTimeout = 0;
          saveViewState(captureScroll());
        }, 250);
      }

      function todayStartScrollLeft() {
        if (state.activeTab !== "groups") return null;
        const index = state.renderedDateKeys.indexOf(currentDateKey());
        if (index === -1) return null;
        return index * state.renderedColumnWidth;
      }

      function updateTodayJump() {
        const target = todayStartScrollLeft();
        if (!els.todayJump || !els.viewport || target == null) {
          if (els.todayJump) els.todayJump.hidden = true;
          return;
        }

        els.todayJump.hidden = false;
        const arrow = els.todayJump.querySelector(".today-jump-arrow");
        const delta = target - els.viewport.scrollLeft;
        const comfortStart = els.viewport.scrollLeft + els.viewport.clientWidth * 0.18;
        const comfortEnd = els.viewport.scrollLeft + els.viewport.clientWidth * 0.82;
        if (target >= comfortStart && target <= comfortEnd) {
          arrow.textContent = "•";
        } else {
          arrow.textContent = delta > 0 ? "→" : "←";
        }
      }

      function scrollTodayToStart() {
        const target = todayStartScrollLeft();
        if (!els.viewport || target == null) return;
        els.viewport.scrollTo({
          left: target,
          top: els.viewport.scrollTop,
          behavior: "smooth",
        });
        requestAnimationFrame(updateTodayJump);
      }

      function offsetText(offset) {
        const sign = offset < 0 ? "-" : "+";
        const abs = Math.abs(offset);
        const hours = String(Math.floor(abs / 60)).padStart(2, "0");
        const minutes = String(abs % 60).padStart(2, "0");
        return `UTC${sign}${hours}:${minutes}`;
      }

      function timezoneLabel(zone) {
        const browserSuffix = zone.offset === getBrowserOffsetMinutes() ? " (browser)" : "";
        return `${offsetText(zone.offset)} - ${zone.city}, ${zone.country}${browserSuffix}`;
      }

      function initTimezoneSelect() {
        els.timezoneSelect.innerHTML = OFFSET_TIMEZONES
          .map((zone) => `<option value="${zone.offset}">${timezoneLabel(zone)}</option>`)
          .join("");
        if (!validOffset(state.timeZoneOffset)) {
          state.timeZoneOffset = 0;
        }
        els.timezoneSelect.value = String(state.timeZoneOffset);
      }

      function buildTabs() {
        els.viewTabs.innerHTML = VIEW_TABS.map(
          (tab) =>
            `<button class="view-tab" type="button" data-tab="${tab.id}" aria-pressed="${tab.id === state.activeTab}">${tab.label}</button>`,
        ).join("");
      }

      function syncControls() {
        const showingGroups = state.activeTab === "groups";
        els.groupControls.hidden = !showingGroups;
        els.standingsToggle.hidden = !showingGroups;
        els.viewport.setAttribute(
          "aria-label",
          showingGroups ? "Group-stage match timeline" : "Knockout-stage bracket",
        );
        if (!showingGroups) {
          els.todayJump.hidden = true;
        }
        els.timezoneSelect.value = String(state.timeZoneOffset);
        els.showTables.checked = state.showTables;
      }

      function teamName(team) {
        if (!team) return "";
        return team.TeamName?.[0]?.Description || team.ShortClubName || team.Abbreviation || "";
      }

      function stageName(match) {
        return match.StageName?.[0]?.Description || "";
      }

      function groupLetter(match) {
        const label = match.GroupName?.[0]?.Description || "";
        return label.replace("Group ", "").trim();
      }

      function localDateKey(match) {
        return dateKeyForMs(match.sortDate);
      }

      function currentDateKey() {
        return dateKeyForMs(Date.now());
      }

      function zonedParts(ms) {
        const date = new Date(ms + state.timeZoneOffset * 60 * 1000);
        return {
          year: String(date.getUTCFullYear()),
          month: String(date.getUTCMonth() + 1).padStart(2, "0"),
          day: String(date.getUTCDate()).padStart(2, "0"),
          hour: String(date.getUTCHours()).padStart(2, "0"),
          minute: String(date.getUTCMinutes()).padStart(2, "0"),
        };
      }

      function dateKeyForMs(ms) {
        const parts = zonedParts(ms);
        return `${parts.year}-${parts.month}-${parts.day}`;
      }

      function formatDate(key) {
        const date = new Date(`${key}T12:00:00Z`);
        return new Intl.DateTimeFormat("en", { month: "short", day: "numeric" }).format(date);
      }

      function formatTime(parts) {
        const hour = Number(parts.hour);
        const suffix = hour >= 12 ? "PM" : "AM";
        const displayHour = hour % 12 || 12;
        return `${displayHour}:${parts.minute} ${suffix}`;
      }

      function formatShortDateTime(match) {
        return formatTime(zonedParts(match.sortDate));
      }

      function formatMatchDateTime(match) {
        return `${formatDate(localDateKey(match))} · ${formatShortDateTime(match)}`;
      }

      function flagUrl(team) {
        if (!team) return "";
        if (!team.PictureUrl) return "";
        return team.PictureUrl.replace("{format}-{size}", "sq-2");
      }

      function teamAbbr(team, fallbackName, fallbackSlot) {
        if (!team) {
          if (fallbackName) return fallbackName.slice(0, 3).toUpperCase();
          return fallbackSlot || "TBD";
        }
        if (team.Abbreviation) return team.Abbreviation;
        if (fallbackName) return fallbackName.slice(0, 3).toUpperCase();
        return fallbackSlot || "TBD";
      }

      function normalize(match) {
        const status =
          match.MatchStatus === 0
            ? "played"
            : match.MatchStatus === 3
              ? "live"
              : "fixture";
        const homeTeam = match.Home || null;
        const awayTeam = match.Away || null;
        const homeScore = homeTeam?.Score == null ? null : Number(homeTeam.Score);
        const awayScore = awayTeam?.Score == null ? null : Number(awayTeam.Score);
        const hasScore = Number.isFinite(homeScore) && Number.isFinite(awayScore);
        const stage = stageName(match);
        const group = groupLetter(match);
        const placeholderA = match.PlaceHolderA || "";
        const placeholderB = match.PlaceHolderB || "";
        const homeName = teamName(homeTeam);
        const awayName = teamName(awayTeam);
        return {
          id: match.IdMatch,
          number: match.MatchNumber,
          status,
          hasScore,
          sortDate: new Date(match.Date).valueOf(),
          stage,
          group,
          isGroupStage: group.length === 1,
          route: placeholderA && placeholderB ? `${placeholderA} vs ${placeholderB}` : "",
          homePenalty:
            match.HomeTeamPenaltyScore == null ? null : Number(match.HomeTeamPenaltyScore),
          awayPenalty:
            match.AwayTeamPenaltyScore == null ? null : Number(match.AwayTeamPenaltyScore),
          home: {
            name: homeName || placeholderA || "TBD",
            abbr: teamAbbr(homeTeam, homeName, placeholderA),
            score: homeScore,
            flag: flagUrl(homeTeam),
            slot: placeholderA,
            winner: status === "played" && hasScore && homeScore > awayScore,
          },
          away: {
            name: awayName || placeholderB || "TBD",
            abbr: teamAbbr(awayTeam, awayName, placeholderB),
            score: awayScore,
            flag: flagUrl(awayTeam),
            slot: placeholderB,
            winner: status === "played" && hasScore && awayScore > homeScore,
          },
        };
      }

      function getGroupMatches() {
        return state.matches.filter((match) => match.isGroupStage);
      }

      function getKnockoutMatches() {
        return state.matches.filter(
          (match) =>
            !match.isGroupStage &&
            ([...KNOCKOUT_MAIN_STAGE_ORDER, "Final"].includes(match.stage) ||
              match.stage === "Play-off for third place"),
        );
      }

      function buildFilters(groupsWithMatches) {
        const availableGroups = GROUPS.filter((group) => groupsWithMatches.has(group));
        const allSelected = state.selectedGroups.size === 0;
        const options = ["all", ...availableGroups];
        els.filters.innerHTML = options
          .map((option) => {
            const label = option === "all" ? "All" : option;
            const ariaLabel = option === "all" ? "All groups" : `Group ${option}`;
            const pressed =
              option === "all"
                ? allSelected
                : state.selectedGroups.has(option);
            const extraClass = option === "all" && allSelected ? " all-selected" : "";
            return `<button class="pill${extraClass}" type="button" data-group="${option}" aria-label="${ariaLabel}" aria-pressed="${pressed}">${label}</button>`;
          })
          .join("");
      }

      function dateRange(matches) {
        return [...new Set(matches.map((match) => localDateKey(match)).filter(Boolean))].sort();
      }

      function updateSummary(matches) {
        const results = matches.filter((match) => match.status === "played");
        const fixtures = matches.filter((match) => match.status === "fixture");
        const live = matches.filter((match) => match.status === "live");
        const goals = results.reduce(
          (sum, match) => sum + (match.home.score || 0) + (match.away.score || 0),
          0,
        );
        const keys = dateRange(matches);
        els.resultCount.textContent = String(results.length);
        els.fixtureCount.textContent = String(fixtures.length);
        els.liveCount.textContent = String(live.length);
        els.goalCount.textContent = String(goals);
        els.dateRange.textContent = keys.length
          ? `${formatDate(keys[0])} - ${formatDate(keys[keys.length - 1])}`
          : "-";
      }

      function axisHtml(keys, columnWidth) {
        if (!keys.length) return "";
        const today = currentDateKey();
        return keys
          .map((key, index) => {
            const x = LABEL_WIDTH + index * columnWidth;
            const isToday = key === today;
            const label = `${formatDate(key)}${isToday ? '<em class="today-badge">Today</em>' : ""}`;
            return `<div class="tick ${isToday ? "today" : ""}" style="left:${x}px"><span>${label}</span></div>`;
          })
          .join("");
      }

      function todayLineHtml(keys, columnWidth) {
        const index = keys.indexOf(currentDateKey());
        if (index === -1) return "";
        const x = LABEL_WIDTH + index * columnWidth;
        return `<div class="today-line" style="left:${x}px" aria-label="Current day"></div>`;
      }

      function participantIconHtml(team) {
        if (team.flag) {
          return `<img class="team-crest" src="${team.flag}" alt="" width="22" height="22" loading="eager" decoding="async" fetchpriority="low" />`;
        }
        return `<span class="team-crest placeholder" aria-hidden="true">${team.slot || team.abbr}</span>`;
      }

      function participantRowHtml(team, teamClass, scoreClass, score) {
        return `
          <div class="${teamClass}">
            ${participantIconHtml(team)}
            <span class="team-name">${team.name}</span>
            <span class="${scoreClass}">${score}</span>
          </div>
        `;
      }

      function matchBadgeHtml(match) {
        if (match.status === "live") return '<span class="badge live">Live</span>';
        if (match.status === "fixture") return '<span class="badge">Fixture</span>';
        return "";
      }

      function cardHtml(match, x, y, color, extraClass = "", metaHtml = "") {
        const title = match.number ? `M${match.number}` : "Match";
        const homeClass = match.home.winner ? "team winner" : "team";
        const awayClass = match.away.winner ? "team winner" : "team";
        const cardClass = [
          "match-card",
          match.status === "fixture" ? "fixture" : "",
          match.status === "live" ? "live" : "",
          extraClass,
        ]
          .filter(Boolean)
          .join(" ");
        const homeScore = match.hasScore ? match.home.score : "vs";
        const awayScore = match.hasScore ? match.away.score : "";
        const scoreClass = match.hasScore ? "score" : "score pending";
        const aria = match.hasScore
          ? `${match.home.name} ${match.home.score}, ${match.away.name} ${match.away.score}`
          : `${match.home.name} versus ${match.away.name}, ${formatMatchDateTime(match)}`;
        return `
          <article class="${cardClass}" style="left:${x}px;top:${y}px;--accent:${color}" aria-label="${aria}">
            <div class="match-head"><span class="match-title">${title}${matchBadgeHtml(match)}</span><span class="match-time">${formatShortDateTime(match)}</span></div>
            ${participantRowHtml(match.home, homeClass, scoreClass, homeScore)}
            ${participantRowHtml(match.away, awayClass, scoreClass, awayScore)}
            ${metaHtml}
          </article>
        `;
      }

      function layoutMatches(matches, dateIndexes, columnWidth) {
        const dateLevels = new Map();
        return matches.map((match) => {
          const dateKey = localDateKey(match);
          const level = dateLevels.get(dateKey) || 0;
          dateLevels.set(dateKey, level + 1);
          const x = dateIndexes.get(dateKey) * columnWidth + columnWidth / 2;
          return { match, x, y: 15 + level * 104, level };
        });
      }

      function standingsForDate(groupMatches, dateKey) {
        const teams = new Map();

        function ensure(team) {
          if (!teams.has(team.name)) {
            teams.set(team.name, {
              name: team.name,
              abbr: team.abbr,
              played: 0,
              won: 0,
              drawn: 0,
              lost: 0,
              gf: 0,
              ga: 0,
              gd: 0,
              points: 0,
            });
          }
          return teams.get(team.name);
        }

        groupMatches.forEach((match) => {
          ensure(match.home);
          ensure(match.away);
        });

        groupMatches
          .filter((match) => match.status === "played" && localDateKey(match) <= dateKey)
          .forEach((match) => {
            const home = ensure(match.home);
            const away = ensure(match.away);
            home.played += 1;
            away.played += 1;
            home.gf += match.home.score;
            home.ga += match.away.score;
            away.gf += match.away.score;
            away.ga += match.home.score;

            if (match.home.score > match.away.score) {
              home.won += 1;
              away.lost += 1;
              home.points += 3;
            } else if (match.home.score < match.away.score) {
              away.won += 1;
              home.lost += 1;
              away.points += 3;
            } else {
              home.drawn += 1;
              away.drawn += 1;
              home.points += 1;
              away.points += 1;
            }
          });

        return [...teams.values()]
          .map((team) => ({ ...team, gd: team.gf - team.ga }))
          .sort(
            (a, b) =>
              b.points - a.points ||
              b.gd - a.gd ||
              b.gf - a.gf ||
              a.name.localeCompare(b.name),
          );
      }

      function standingsHtml(groupMatches, tableKeys, dateIndexes, columnWidth, tableTop) {
        return tableKeys
          .map((key) => {
            const x = dateIndexes.get(key) * columnWidth + columnWidth / 2;
            const rows = standingsForDate(groupMatches, key)
              .map(
                (team) => `
                  <tr>
                    <td class="standings-team" title="${team.name}">${team.abbr}</td>
                    <td>${team.played}</td>
                    <td>${team.won}</td>
                    <td>${team.drawn}</td>
                    <td>${team.lost}</td>
                    <td>${team.gd > 0 ? "+" : ""}${team.gd}</td>
                    <td>${team.points}</td>
                  </tr>
                `,
              )
              .join("");
            return `
              <aside class="standings-card" style="left:${x}px;top:${tableTop}px" aria-label="Group standings after ${formatDate(key)}">
                <div class="standings-title"><span>Table</span><span>After ${formatDate(key)}</span></div>
                <table class="standings-table">
                  <thead><tr><th>Team</th><th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead>
                  <tbody>${rows}</tbody>
                </table>
              </aside>
            `;
          })
          .join("");
      }

      function groupStandingsRailHtml() {
        const groupMatches = getGroupMatches();
        const cards = GROUPS.map((group) => {
          const matches = groupMatches.filter((match) => match.group === group);
          if (!matches.length) return "";
          const keys = dateRange(matches);
          const lastKey = keys[keys.length - 1];
          const rows = standingsForDate(matches, lastKey)
            .map(
              (team) => `
                <tr>
                  <td title="${team.name}">${team.abbr}</td>
                  <td>${team.gd > 0 ? "+" : ""}${team.gd}</td>
                  <td>${team.points}</td>
                </tr>
              `,
            )
            .join("");
          return `
            <section class="knockout-group-card" aria-label="Final Group ${group} standings">
              <div class="knockout-group-title"><span>Group ${group}</span><span>Final</span></div>
              <table class="knockout-group-table">
                <thead><tr><th>Team</th><th>GD</th><th>Pts</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </section>
          `;
        }).join("");
        return `
          <aside class="knockout-standings">
            <span class="knockout-kicker">Final groups</span>
            <h2>Standings</h2>
            <div class="knockout-standings-grid">${cards}</div>
          </aside>
        `;
      }

      function parseKnockoutSlot(slot) {
        if (!slot) return null;
        const winner = /^W(\d+)$/.exec(slot);
        if (winner) return { kind: "winner", number: Number(winner[1]) };
        const runnerUp = /^RU(\d+)$/.exec(slot);
        if (runnerUp) return { kind: "runnerUp", number: Number(runnerUp[1]) };
        const groupWinner = /^1([A-L])$/.exec(slot);
        if (groupWinner) return { kind: "groupWinner", group: groupWinner[1] };
        const groupRunnerUp = /^2([A-L])$/.exec(slot);
        if (groupRunnerUp) return { kind: "groupRunnerUp", group: groupRunnerUp[1] };
        const bestThird = /^3([A-L]+)$/.exec(slot);
        if (bestThird) return { kind: "bestThird", groups: bestThird[1] };
        return null;
      }

      function humanizeGroups(groups) {
        return groups.split("").join("/");
      }

      function matchHasResolvedTeams(match) {
        return [match.home, match.away].every(
          (team) => !team.slot || (team.name && team.name !== team.slot),
        );
      }

      function sourceMatchSummary(match) {
        if (!match) return "";
        if (matchHasResolvedTeams(match)) {
          return `${match.home.name} vs ${match.away.name}`;
        }
        return `${KNOCKOUT_STAGE_LABELS[match.stage] || match.stage} M${match.number}`;
      }

      function knockoutParticipantView(team, context) {
        const parsed = parseKnockoutSlot(team.slot);
        const resolved = Boolean(team.flag || (team.slot && team.name !== team.slot));
        if (!parsed) {
          return { name: team.name, detail: "" };
        }

        if (resolved) {
          if (parsed.kind === "winner") {
            return { name: team.name, detail: `Advanced from M${parsed.number}` };
          }
          if (parsed.kind === "runnerUp") {
            return { name: team.name, detail: `Dropped from M${parsed.number}` };
          }
          if (parsed.kind === "groupWinner") {
            return { name: team.name, detail: `Winner Group ${parsed.group}` };
          }
          if (parsed.kind === "groupRunnerUp") {
            return { name: team.name, detail: `Runner-up Group ${parsed.group}` };
          }
          if (parsed.kind === "bestThird") {
            return {
              name: team.name,
              detail: `Best 3rd-place from ${humanizeGroups(parsed.groups)}`,
            };
          }
        }

        if (parsed.kind === "winner") {
          const source = context.matchByNumber.get(parsed.number);
          return {
            name: `Winner of M${parsed.number}`,
            detail: sourceMatchSummary(source),
          };
        }
        if (parsed.kind === "runnerUp") {
          const source = context.matchByNumber.get(parsed.number);
          return {
            name: `Loser of M${parsed.number}`,
            detail: KNOCKOUT_STAGE_LABELS[source?.stage] || "Semi-final",
          };
        }
        if (parsed.kind === "groupWinner") {
          return { name: `Winner Group ${parsed.group}`, detail: "Qualified from groups" };
        }
        if (parsed.kind === "groupRunnerUp") {
          return { name: `Runner-up Group ${parsed.group}`, detail: "Qualified from groups" };
        }
        if (parsed.kind === "bestThird") {
          return {
            name: "Best 3rd-place team",
            detail: `From groups ${humanizeGroups(parsed.groups)}`,
          };
        }
        return { name: team.name, detail: "" };
      }

      function leftForStageIndex(index) {
        return (
          KNOCKOUT_LEFT_PADDING +
          index * KNOCKOUT_COLUMN_WIDTH +
          (KNOCKOUT_COLUMN_WIDTH - KNOCKOUT_CARD_WIDTH) / 2
        );
      }

      function knockoutColumnStart(index) {
        return KNOCKOUT_LEFT_PADDING + index * KNOCKOUT_COLUMN_WIDTH;
      }

      function sourceMatchNumbers(match) {
        return [match.home.slot, match.away.slot]
          .map((slot) => {
            const found = /^(?:W|RU)(\d+)$/.exec(slot || "");
            return found ? Number(found[1]) : null;
          })
          .filter(Number.isFinite);
      }

      function orderedSourceMatchNumbers(match) {
        return [match.home.slot, match.away.slot]
          .map((slot) => {
            const parsed = parseKnockoutSlot(slot);
            return parsed?.number || null;
          })
          .filter(Number.isFinite);
      }

      function stageFallbackTop(stage, index) {
        const multiplier = Math.max(1, 2 ** KNOCKOUT_MAIN_STAGE_ORDER.indexOf(stage));
        return (
          KNOCKOUT_TOP_PADDING +
          index * (KNOCKOUT_CARD_HEIGHT + KNOCKOUT_BASE_GAP) * multiplier
        );
      }

      function buildKnockoutContext(matches) {
        const matchByNumber = new Map(matches.map((match) => [match.number, match]));
        const downstream = new Map();

        matches.forEach((match) => {
          [match.home.slot, match.away.slot].forEach((slot) => {
            const parsed = parseKnockoutSlot(slot);
            if (!parsed || !parsed.number) return;
            if (!downstream.has(parsed.number)) {
              downstream.set(parsed.number, { winner: [], runnerUp: [] });
            }
            const flows = downstream.get(parsed.number);
            if (parsed.kind === "winner") flows.winner.push(match);
            if (parsed.kind === "runnerUp") flows.runnerUp.push(match);
          });
        });

        return { matchByNumber, downstream };
      }

      function collectStageOrder(matchNumber, stageName, context, acc, seen) {
        const match = context.matchByNumber.get(matchNumber);
        if (!match) return;
        if (match.stage === stageName) {
          if (!seen.has(match.number)) {
            acc.push(match.number);
            seen.add(match.number);
          }
          return;
        }
        orderedSourceMatchNumbers(match).forEach((sourceNumber) => {
          collectStageOrder(sourceNumber, stageName, context, acc, seen);
        });
      }

      function buildKnockoutLayout(matches) {
        const byStage = new Map();
        const positionByNumber = new Map();
        const cards = [];
        const lines = [];
        const nodes = [];
        const stageLabels = [];
        const stageMatches = matches
          .slice()
          .sort((a, b) => a.sortDate - b.sortDate || a.number - b.number);
        const context = buildKnockoutContext(matches);
        const finalMatch = stageMatches.find((match) => match.stage === "Final") || null;
        const rootNumber = finalMatch?.number || 104;

        for (const stage of [
          ...KNOCKOUT_MAIN_STAGE_ORDER,
          "Final",
          "Play-off for third place",
        ]) {
          byStage.set(
            stage,
            stageMatches.filter((match) => match.stage === stage),
          );
        }

        const stageOrder = new Map();
        [...KNOCKOUT_MAIN_STAGE_ORDER, "Final"].forEach((stage) => {
          const numbers = [];
          collectStageOrder(rootNumber, stage, context, numbers, new Set());
          if (!numbers.length) {
            stageOrder.set(
              stage,
              (byStage.get(stage) || [])
                .slice()
                .sort((a, b) => a.sortDate - b.sortDate || a.number - b.number)
                .map((match) => match.number),
            );
            return;
          }
          stageOrder.set(stage, numbers);
        });

        KNOCKOUT_MAIN_STAGE_ORDER.forEach((stage, index) => {
          stageLabels.push({
            label: KNOCKOUT_STAGE_LABELS[stage],
            left: knockoutColumnStart(index),
          });
        });
        stageLabels.push({
          label: KNOCKOUT_STAGE_LABELS["Play-off for third place"],
          left: knockoutColumnStart(KNOCKOUT_THIRD_PLACE_COLUMN_INDEX),
        });
        stageLabels.push({
          label: KNOCKOUT_STAGE_LABELS.Final,
          left: knockoutColumnStart(KNOCKOUT_FINAL_COLUMN_INDEX),
        });

        (stageOrder.get("Round of 32") || []).forEach((matchNumber, index) => {
          const match = context.matchByNumber.get(matchNumber);
          if (!match) return;
          const left = leftForStageIndex(0);
          const top = KNOCKOUT_TOP_PADDING + index * (KNOCKOUT_CARD_HEIGHT + KNOCKOUT_BASE_GAP);
          const position = {
            left,
            top,
            centerX: left + KNOCKOUT_CARD_WIDTH / 2,
            centerY: top + KNOCKOUT_CARD_HEIGHT / 2,
          };
          positionByNumber.set(match.number, position);
          cards.push({ match, position });
        });

        KNOCKOUT_MAIN_STAGE_ORDER.slice(1).forEach((stage, stageIndex) => {
          const left = leftForStageIndex(stageIndex + 1);
          (stageOrder.get(stage) || []).forEach((matchNumber, index) => {
            const match = context.matchByNumber.get(matchNumber);
            if (!match) return;
            const sources = orderedSourceMatchNumbers(match)
              .map((number) => positionByNumber.get(number))
              .filter(Boolean);
            const centerY = sources.length
              ? sources.reduce((sum, source) => sum + source.centerY, 0) / sources.length
              : stageFallbackTop(stage, index) + KNOCKOUT_CARD_HEIGHT / 2;
            const top = centerY - KNOCKOUT_CARD_HEIGHT / 2;
            const position = {
              left,
              top,
              centerX: left + KNOCKOUT_CARD_WIDTH / 2,
              centerY,
            };
            positionByNumber.set(match.number, position);
            cards.push({ match, position });
            sources.forEach((source) => {
              const elbow = source.left + KNOCKOUT_CARD_WIDTH + KNOCKOUT_COLUMN_GAP / 2;
              lines.push({
                path: `M ${source.left + KNOCKOUT_CARD_WIDTH} ${source.centerY} H ${elbow} V ${centerY} H ${left}`,
              });
              nodes.push({ cx: elbow, cy: source.centerY });
              nodes.push({ cx: elbow, cy: centerY });
            });
          });
        });

        (stageOrder.get("Final") || []).forEach((matchNumber, index) => {
          const match = context.matchByNumber.get(matchNumber);
          if (!match) return;
          const sources = orderedSourceMatchNumbers(match)
            .map((number) => positionByNumber.get(number))
            .filter(Boolean);
          const centerY = sources.length
            ? sources.reduce((sum, source) => sum + source.centerY, 0) / sources.length
            : stageFallbackTop("Semi-final", index + 1) + KNOCKOUT_CARD_HEIGHT / 2;
          const top = centerY - KNOCKOUT_CARD_HEIGHT / 2;
          const position = {
            left: KNOCKOUT_FINAL_LEFT,
            top,
            centerX: KNOCKOUT_FINAL_LEFT + KNOCKOUT_CARD_WIDTH / 2,
            centerY,
          };
          positionByNumber.set(match.number, position);
          cards.push({ match, position });
          sources.forEach((source) => {
            const elbow = source.left + KNOCKOUT_CARD_WIDTH + KNOCKOUT_COLUMN_GAP / 2;
            lines.push({
              path: `M ${source.left + KNOCKOUT_CARD_WIDTH} ${source.centerY} H ${elbow} V ${centerY} H ${KNOCKOUT_FINAL_LEFT}`,
            });
            nodes.push({ cx: elbow, cy: source.centerY });
            nodes.push({ cx: elbow, cy: centerY });
          });
        });

        const finalPosition = (byStage.get("Final") || [])
          .map((match) => positionByNumber.get(match.number))
          .find(Boolean);

        (byStage.get("Play-off for third place") || []).forEach((match, index) => {
          const sources = orderedSourceMatchNumbers(match)
            .map((number) => positionByNumber.get(number))
            .filter(Boolean);
          const centerY = finalPosition
            ? finalPosition.centerY + KNOCKOUT_THIRD_PLACE_OFFSET
            : sources.length
              ? sources.reduce((sum, source) => sum + source.centerY, 0) / sources.length +
                KNOCKOUT_CARD_HEIGHT * 0.8
              : stageFallbackTop("Semi-final", index + 2) + KNOCKOUT_CARD_HEIGHT / 2;
          const top = centerY - KNOCKOUT_CARD_HEIGHT / 2;
          const position = {
            left: KNOCKOUT_THIRD_PLACE_LEFT,
            top,
            centerX: KNOCKOUT_THIRD_PLACE_LEFT + KNOCKOUT_CARD_WIDTH / 2,
            centerY,
          };
          positionByNumber.set(match.number, position);
          cards.push({ match, position });
          sources.forEach((source) => {
            const elbow = source.left + KNOCKOUT_CARD_WIDTH + KNOCKOUT_COLUMN_GAP / 2;
            lines.push({
              path: `M ${source.left + KNOCKOUT_CARD_WIDTH} ${source.centerY} H ${elbow} V ${position.centerY} H ${KNOCKOUT_THIRD_PLACE_LEFT}`,
            });
            nodes.push({ cx: elbow, cy: source.centerY });
            nodes.push({ cx: elbow, cy: position.centerY });
          });
        });

        const height =
          Math.max(...cards.map(({ position }) => position.top + KNOCKOUT_CARD_HEIGHT), 0) + 42;
        const width =
          knockoutColumnStart(KNOCKOUT_FINAL_COLUMN_INDEX) + KNOCKOUT_COLUMN_WIDTH;
        return { cards, lines, nodes, stageLabels, width, height };
      }

      function bracketMetaHtml(match, context) {
        const notes = [];
        const downstream = context.downstream.get(match.number);
        if (downstream?.winner?.length) {
          notes.push(`<span class="flow-pill">Winner → M${downstream.winner[0].number}</span>`);
        }
        if (downstream?.runnerUp?.length) {
          notes.push(`<span class="flow-pill">Loser → M${downstream.runnerUp[0].number}</span>`);
        }
        if (Number.isFinite(match.homePenalty) && Number.isFinite(match.awayPenalty)) {
          notes.push(`<span class="flow-pill bracket-note">Pens ${match.homePenalty}-${match.awayPenalty}</span>`);
        }
        if (!notes.length) return "";
        return `<div class="bracket-meta">${notes.join("")}</div>`;
      }

      function knockoutParticipantRowHtml(team, teamClass, scoreClass, score, context) {
        const view = knockoutParticipantView(team, context);
        return `
          <div class="${teamClass}">
            ${participantIconHtml(team)}
            <span class="team-stack">
              <span class="team-name">${view.name}</span>
              ${view.detail ? `<span class="team-detail">${view.detail}</span>` : ""}
            </span>
            <span class="${scoreClass}">${score}</span>
          </div>
        `;
      }

      function knockoutCardHtml(match, position, context) {
        const color = KNOCKOUT_STAGE_COLORS[match.stage] || "#1f6feb";
        const title = match.number ? `M${match.number}` : "Match";
        const homeClass = match.home.winner ? "team winner" : "team";
        const awayClass = match.away.winner ? "team winner" : "team";
        const cardClass = [
          "match-card",
          "bracket-card",
          match.status === "fixture" ? "fixture" : "",
          match.status === "live" ? "live" : "",
        ]
          .filter(Boolean)
          .join(" ");
        const homeScore = match.hasScore ? match.home.score : "vs";
        const awayScore = match.hasScore ? match.away.score : "";
        const scoreClass = match.hasScore ? "score" : "score pending";
        const homeView = knockoutParticipantView(match.home, context);
        const awayView = knockoutParticipantView(match.away, context);
        const aria = match.hasScore
          ? `${homeView.name} ${match.home.score}, ${awayView.name} ${match.away.score}`
          : `${homeView.name} versus ${awayView.name}, ${formatMatchDateTime(match)}`;
        return `
          <article class="${cardClass}" style="left:${position.centerX}px;top:${position.top}px;--accent:${color}" aria-label="${aria}">
            <div class="match-head"><span class="match-title">${title}${matchBadgeHtml(match)}</span><span class="match-time">${formatMatchDateTime(match)}</span></div>
            ${knockoutParticipantRowHtml(match.home, homeClass, scoreClass, homeScore, context)}
            ${knockoutParticipantRowHtml(match.away, awayClass, scoreClass, awayScore, context)}
            ${bracketMetaHtml(match, context)}
          </article>
        `;
      }

      function restoreScroll(targetScroll) {
        if (!els.viewport || !targetScroll) return;
        requestAnimationFrame(() => {
          els.viewport.scrollLeft = targetScroll.left;
          els.viewport.scrollTop = targetScroll.top;
          saveViewState({
            left: els.viewport.scrollLeft,
            top: els.viewport.scrollTop,
          });
          updateTodayJump();
        });
      }

      function renderGroupStage(options = {}) {
        const preservedScroll = options.preserveScroll ? captureScroll() : null;
        const restoredScroll = options.restoreSavedScroll
          ? state.scrollByTab.groups
          : null;
        const groupMatches = getGroupMatches();
        const groupsWithMatches = new Set(groupMatches.map((match) => match.group));
        state.selectedGroups = new Set(
          [...state.selectedGroups].filter((group) => groupsWithMatches.has(group)),
        );
        if (
          state.selectedGroups.size > 0 &&
          [...groupsWithMatches].every((group) => state.selectedGroups.has(group))
        ) {
          state.selectedGroups.clear();
        }
        buildFilters(groupsWithMatches);

        const allGroupsVisible = state.selectedGroups.size === 0;
        const visible = groupMatches.filter(
          (match) => allGroupsVisible || state.selectedGroups.has(match.group),
        );
        const keys = dateRange(visible);
        if (!visible.length || !keys.length) {
          state.renderedDateKeys = [];
          els.timeline.style.width = "auto";
          els.timeline.innerHTML = '<div class="empty">No group-stage matches found</div>';
          updateSummary([]);
          updateTodayJump();
          return;
        }

        const showTables = state.showTables;
        const columnWidth = showTables ? TABLE_DATE_COLUMN_WIDTH : DATE_COLUMN_WIDTH;
        state.renderedDateKeys = keys;
        state.renderedColumnWidth = columnWidth;
        const width = Math.max(760, LABEL_WIDTH + keys.length * columnWidth);
        const dateIndexes = new Map(keys.map((key, index) => [key, index]));
        const groups = GROUPS.filter(
          (group) =>
            groupsWithMatches.has(group) && (allGroupsVisible || state.selectedGroups.has(group)),
        );

        const rows = groups
          .map((group) => {
            const matches = visible.filter((match) => match.group === group);
            const color = GROUP_COLORS[GROUPS.indexOf(group) % GROUP_COLORS.length];
            const laidOut = layoutMatches(matches, dateIndexes, columnWidth);
            const maxLevel = Math.max(0, ...laidOut.map((item) => item.level));
            const tableTop = 128 + maxLevel * 104;
            const tableKeys = keys.filter((key) =>
              matches.some(
                (match) => match.status === "played" && localDateKey(match) === key,
              ),
            );
            const tableHtml = showTables
              ? standingsHtml(matches, tableKeys, dateIndexes, columnWidth, tableTop)
              : "";
            const rowHeight =
              showTables && tableKeys.length
                ? tableTop + 158
                : Math.max(126, 122 + maxLevel * 104);
            const cards = laidOut
              .map((item) => cardHtml(item.match, item.x, item.y, color))
              .join("");
            return `
              <section class="group-row" aria-label="Group ${group}" style="min-height:${rowHeight}px">
                <div class="group-label">Group ${group}</div>
                <div class="lane ${showTables ? "with-tables" : ""}" style="min-height:${rowHeight}px">${cards}${tableHtml}</div>
              </section>
            `;
          })
          .join("");

        els.timeline.style.width = `${width}px`;
        els.timeline.style.setProperty("--date-column-width", `${columnWidth}px`);
        els.timeline.innerHTML = `<div class="axis">${axisHtml(keys, columnWidth)}</div>${todayLineHtml(keys, columnWidth)}${rows}`;
        updateSummary(visible);

        if (preservedScroll || restoredScroll) {
          restoreScroll(preservedScroll || restoredScroll);
        } else {
          scrollToToday(keys, columnWidth);
        }
        updateTodayJump();
      }

      function renderKnockout(options = {}) {
        const preservedScroll = options.preserveScroll ? captureScroll() : null;
        const restoredScroll = options.restoreSavedScroll
          ? state.scrollByTab.knockout
          : null;
        const visible = getKnockoutMatches();
        if (!visible.length) {
          state.renderedDateKeys = [];
          els.timeline.style.width = "auto";
          els.timeline.innerHTML = '<div class="empty">No knockout-stage matches found</div>';
          updateSummary([]);
          updateTodayJump();
          return;
        }

        const context = buildKnockoutContext(visible);
        const layout = buildKnockoutLayout(visible);
        const stageLabels = layout.stageLabels
          .map(
            (stage) =>
              `<div class="bracket-stage" style="left:${stage.left}px"><span>${stage.label}</span></div>`,
          )
          .join("");
        const lines = layout.lines
          .map((line) => `<path class="bracket-line" d="${line.path}"></path>`)
          .join("");
        const nodes = layout.nodes
          .map((node) => `<circle class="bracket-node" cx="${node.cx}" cy="${node.cy}" r="3.5"></circle>`)
          .join("");
        const cards = layout.cards
          .map(({ match, position }) => knockoutCardHtml(match, position, context))
          .join("");

        els.timeline.style.width = `${KNOCKOUT_RAIL_WIDTH + layout.width}px`;
        els.timeline.style.setProperty("--knockout-column-width", `${KNOCKOUT_COLUMN_WIDTH}px`);
        els.timeline.style.removeProperty("--date-column-width");
        els.timeline.innerHTML = `
          <div class="knockout-shell">
            ${groupStandingsRailHtml()}
            <section class="knockout-board" aria-label="Knockout bracket">
              <div class="knockout-axis">
                <div class="knockout-axis-inner" style="width:${layout.width}px">${stageLabels}</div>
              </div>
              <div class="knockout-bracket" style="width:${layout.width}px;height:${layout.height}px">
                <svg class="bracket-lines" viewBox="0 0 ${layout.width} ${layout.height}" preserveAspectRatio="none" aria-hidden="true">${lines}${nodes}</svg>
                ${cards}
              </div>
            </section>
          </div>
        `;
        state.renderedDateKeys = [];
        updateSummary(visible);

        if (preservedScroll || restoredScroll) {
          restoreScroll(preservedScroll || restoredScroll);
        } else {
          requestAnimationFrame(() => {
            els.viewport.scrollLeft = 0;
            els.viewport.scrollTop = 0;
            saveViewState({ left: 0, top: 0 });
          });
        }
        updateTodayJump();
      }

      function render(options = {}) {
        buildTabs();
        syncControls();
        if (state.activeTab === "knockout") {
          renderKnockout(options);
          return;
        }
        renderGroupStage(options);
      }

      function scrollToToday(keys, columnWidth) {
        const index = keys.indexOf(currentDateKey());
        if (index === -1) return;
        requestAnimationFrame(() => {
          if (!els.viewport) return;
          const x = LABEL_WIDTH + index * columnWidth;
          els.viewport.scrollLeft = Math.max(0, x - els.viewport.clientWidth * 0.22);
          saveViewState(captureScroll());
          updateTodayJump();
        });
      }

      async function loadMatches() {
        try {
          const response = await fetch(API_URL, { cache: "no-store" });
          if (!response.ok) throw new Error(`FIFA API returned ${response.status}`);
          const payload = await response.json();
          state.matches = payload.Results
            .filter((match) => [0, 1, 3].includes(match.MatchStatus))
            .map(normalize)
            .sort((a, b) => a.sortDate - b.sortDate || a.number - b.number);
          render({ restoreSavedScroll: true });
        } catch (error) {
          els.timeline.style.width = "auto";
          els.timeline.innerHTML = `<div class="empty">${error.message}</div>`;
          els.dateRange.textContent = "Load failed";
          console.error(error);
        }
      }

      els.viewTabs.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-tab]");
        if (!button) return;
        const nextTab = button.dataset.tab;
        if (!validTab(nextTab) || nextTab === state.activeTab) return;
        saveViewState(captureScroll());
        state.activeTab = nextTab;
        render({ restoreSavedScroll: true });
      });

      els.filters.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-group]");
        if (!button) return;
        const group = button.dataset.group;
        if (group === "all") {
          state.selectedGroups.clear();
          saveViewState(captureScroll());
          render();
          return;
        }

        const availableGroups = GROUPS.filter((candidate) =>
          getGroupMatches().some((match) => match.group === candidate),
        );
        if (state.selectedGroups.size === 0) {
          state.selectedGroups = new Set([group]);
        } else if (state.selectedGroups.has(group)) {
          state.selectedGroups.delete(group);
        } else {
          state.selectedGroups.add(group);
        }
        if (availableGroups.every((candidate) => state.selectedGroups.has(candidate))) {
          state.selectedGroups.clear();
        }
        saveViewState(captureScroll());
        render();
      });

      els.showTables.addEventListener("change", () => {
        state.showTables = els.showTables.checked;
        saveViewState(captureScroll());
        render({ preserveScroll: true });
      });

      els.timezoneSelect.addEventListener("change", () => {
        state.timeZoneOffset = Number(els.timezoneSelect.value);
        saveViewState(captureScroll());
        render();
      });

      els.todayJump.addEventListener("click", scrollTodayToStart);
      els.viewport.addEventListener("scroll", scheduleScrollSave, { passive: true });

      loadViewState();
      initTimezoneSelect();
      buildTabs();
      syncControls();
      loadMatches();
    </script>
    <script type="module">
      import * as THREE from "./vendor/three.module.js";

      const canvas = document.querySelector("#brandBall3d");
      function initBrandBall() {
        if (!canvas) return;

        const renderer = new THREE.WebGLRenderer({
          canvas,
          alpha: true,
          antialias: false,
          preserveDrawingBuffer: false,
          powerPreference: "low-power",
        });
        renderer.setPixelRatio(1);
        renderer.setSize(64, 64, false);
        renderer.outputColorSpace = THREE.SRGBColorSpace;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 10);
        camera.position.set(0, 0, 3.8);

        const texture = new THREE.TextureLoader().load(
          "assets/sportballs/football-free.jpg",
          () => render(),
        );
        texture.colorSpace = THREE.SRGBColorSpace;
        texture.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 2);

        const ball = new THREE.Mesh(
          new THREE.SphereGeometry(1, 48, 32),
          new THREE.MeshStandardMaterial({
            map: texture,
            bumpMap: texture,
            bumpScale: 0.018,
            roughness: 0.42,
            metalness: 0,
          }),
        );
        ball.rotation.set(-0.16, -0.3, 0.06);
        scene.add(ball);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x3e5f45, 1.75));
        const key = new THREE.DirectionalLight(0xffffff, 2.4);
        key.position.set(-2.2, 2.4, 3.2);
        scene.add(key);
        const rim = new THREE.DirectionalLight(0xb7f2bd, 1.3);
        rim.position.set(2.4, -0.8, -2.8);
        scene.add(rim);

        const shadow = new THREE.Mesh(
          new THREE.CircleGeometry(0.92, 48),
          new THREE.MeshBasicMaterial({
            color: 0x17212b,
            transparent: true,
            opacity: 0.13,
            depthWrite: false,
          }),
        );
        shadow.position.set(0.16, -0.16, -0.7);
        shadow.scale.set(1.08, 0.45, 1);
        scene.add(shadow);

        function render() {
          renderer.render(scene, camera);
        }

        render();
      }

      initBrandBall();
    </script>
  </body>
</html>
